services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/database:/app/database # Persist SQLite database
      - ./logs:/app/logs # Persist app logs to project root logs directory
    restart: unless-stopped
