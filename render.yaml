services:
  - type: web
    name: diaplus-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: "ipuni-production-jwt-secret-2026-secure"
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-flash-lite-latest"
